<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f0f14" />
    <title>Moody — Log</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .log-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }
      .log-header h1 {
        font-size: 1.4rem;
        background: none;
        -webkit-text-fill-color: var(--text);
        animation: none;
      }
      .back-link {
        color: var(--accent);
        text-decoration: none;
        font-size: 0.85rem;
      }
      .clear-btn {
        font-family: inherit;
        font-size: 0.75rem;
        padding: 6px 12px;
        border: 1px solid var(--bg-elevated);
        border-radius: 8px;
        background: var(--bg-card);
        color: var(--text-muted);
        cursor: pointer;
      }
      .event-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .event-item {
        background: var(--bg-card);
        border-radius: var(--radius-sm);
        padding: 10px 14px;
        border-left: 3px solid var(--negative);
        cursor: pointer;
        user-select: none;
      }
      .event-item.success {
        border-left-color: var(--positive);
      }
      .event-summary {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .event-source {
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--negative);
        flex-shrink: 0;
      }
      .event-item.success .event-source {
        color: var(--positive);
      }
      .event-message {
        font-size: 0.8rem;
        color: var(--text);
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .event-detail-section {
        display: none;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--bg-elevated);
      }
      .event-item.expanded .event-detail-section {
        display: block;
      }
      .event-time {
        font-size: 0.65rem;
        color: var(--text-muted);
        margin-bottom: 4px;
      }
      .event-detail {
        font-size: 0.75rem;
        color: var(--text-muted);
        word-break: break-word;
      }
      .empty {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-top: 48px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="log-header">
        <a href="index.html" class="back-link">&larr; Back</a>
        <h1>Log</h1>
        <button class="clear-btn" id="clear-btn">Clear</button>
      </div>
      <div class="event-list" id="event-list"></div>
    </div>
    <script>
      const LOG_KEY = 'moody_event_log';
      const list = document.getElementById('event-list');
      const clearBtn = document.getElementById('clear-btn');

      function render() {
        const events = JSON.parse(localStorage.getItem(LOG_KEY) || '[]');
        if (events.length === 0) {
          list.innerHTML = '<p class="empty">No events logged</p>';
          return;
        }
        list.innerHTML = events
          .slice()
          .reverse()
          .map(
            (e) => `
          <div class="event-item ${e.level === 'success' ? 'success' : ''}" onclick="this.classList.toggle('expanded')">
            <div class="event-summary">
              <span class="event-source">${e.source}</span>
              <span class="event-message">${e.message}</span>
            </div>
            <div class="event-detail-section">
              <div class="event-time">${new Date(e.time).toLocaleString()}</div>
              ${e.detail ? `<div class="event-detail">${e.detail}</div>` : ''}
            </div>
          </div>`,
          )
          .join('');
      }

      clearBtn.addEventListener('click', () => {
        localStorage.removeItem(LOG_KEY);
        render();
      });

      render();
    </script>
  </body>
</html>
